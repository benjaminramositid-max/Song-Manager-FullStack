<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Song Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .song-card {
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #0d6efd;
        }
        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .genre-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 500;
        }
        .genre-Pop { background: #ff6b6b; color: white; }
        .genre-Rock { background: #4ecdc4; color: white; }
        .genre-HipHop { background: #45b7d1; color: white; }
        .genre-Jazz { background: #f7b731; color: white; }
        .genre-Classical { background: #5f27cd; color: white; }
        .genre-Electronic { background: #00d2d3; color: white; }
        .genre-Reggae { background: #20bf6b; color: white; }
        .genre-RB { background: #e056fd; color: white; }
        .genre-Country { background: #f0932b; color: white; }
        .genre-Other { background: #95a5a6; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-vinyl-fill"></i> My Song Manager
            </span>
        </div>
    </nav>

    <div class="container py-4">
        <div class="row g-4">
            <!-- Formulario para agregar -->
            <div class="col-lg-4">
                <div class="card shadow-sm sticky-top" style="top: 20px;">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Song</h5>
                    </div>
                    <div class="card-body">
                        <form id="song-form">
                            <div class="mb-3">
                                <label for="song-title" class="form-label">Song Title *</label>
                                <input type="text" class="form-control" id="song-title" placeholder="e.g., Bohemian Rhapsody" required>
                            </div>
                            <div class="mb-3">
                                <label for="song-artist" class="form-label">Artist (Optional)</label>
                                <input type="text" class="form-control" id="song-artist" placeholder="e.g., Queen">
                            </div>
                            <div class="mb-3">
                                <label for="song-genre" class="form-label">Genre (Optional)</label>
                                <select class="form-select" id="song-genre">
                                    <option value="">Select genre</option>
                                    <option value="Pop">🎤 Pop</option>
                                    <option value="Rock">🎸 Rock</option>
                                    <option value="Hip Hop">🎧 Hip Hop</option>
                                    <option value="Jazz">🎷 Jazz</option>
                                    <option value="Classical">🎻 Classical</option>
                                    <option value="Electronic">🎛️ Electronic</option>
                                    <option value="Reggae">🌺 Reggae</option>
                                    <option value="R&B">🎵 R&B</option>
                                    <option value="Country">🤠 Country</option>
                                    <option value="Other">📀 Other</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-music-note"></i> Add to Playlist
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Lista de canciones -->
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-music-note-list"></i> My Playlist</h5>
                        <span class="badge bg-light text-dark" id="song-count">0 songs</span>
                    </div>
                    <div class="card-body">
                        <div id="songs-container">
                            <div class="text-center py-5 text-muted">
                                <i class="bi bi-music-note" style="font-size: 3rem;"></i>
                                <p class="mt-3">Loading your playlist...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para editar -->
    <div class="modal fade" id="editSongModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title"><i class="bi bi-pencil-square"></i> Edit Song</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-song-form">
                        <input type="hidden" id="edit-song-id">
                        <div class="mb-3">
                            <label for="edit-song-title" class="form-label">Song Title *</label>
                            <input type="text" class="form-control" id="edit-song-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-song-artist" class="form-label">Artist</label>
                            <input type="text" class="form-control" id="edit-song-artist">
                        </div>
                        <div class="mb-3">
                            <label for="edit-song-genre" class="form-label">Genre</label>
                            <select class="form-select" id="edit-song-genre">
                                <option value="">Select genre</option>
                                <option value="Pop">Pop</option>
                                <option value="Rock">Rock</option>
                                <option value="Hip Hop">Hip Hop</option>
                                <option value="Jazz">Jazz</option>
                                <option value="Classical">Classical</option>
                                <option value="Electronic">Electronic</option>
                                <option value="Reggae">Reggae</option>
                                <option value="R&B">R&B</option>
                                <option value="Country">Country</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="edit-song-form" class="btn btn-warning">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast align-items-center border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="appToastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
