<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Song Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .song-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .song-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .genre-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        .genre-Pop { background-color: #ff6b6b; color: white; }
        .genre-Rock { background-color: #4ecdc4; color: white; }
        .genre-Hip Hop { background-color: #45b7d1; color: white; }
        .genre-Jazz { background-color: #f7b731; color: white; }
        .genre-Classical { background-color: #5f27cd; color: white; }
        .genre-Electronic { background-color: #00d2d3; color: white; }
        .genre-Reggae { background-color: #20bf6b; color: white; }
        .genre-R&B { background-color: #e056fd; color: white; }
        .genre-Country { background-color: #f0932b; color: white; }
        .genre-Other { background-color: #95a5a6; color: white; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-music-note-beamed"></i> Song Manager
            </span>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> Add New Song</h5>
                    </div>
                    <div class="card-body">
                        <form id="song-form">
                            <div class="mb-3">
                                <label for="song-title" class="form-label">Song Title *</label>
                                <input type="text" class="form-control" id="song-title" placeholder="Enter song name" required>
                            </div>
                            <div class="mb-3">
                                <label for="song-artist" class="form-label">Artist</label>
                                <input type="text" class="form-control" id="song-artist" placeholder="Enter artist name">
                            </div>
                            <div class="mb-3">
                                <label for="song-genre" class="form-label">Genre</label>
                                <select class="form-select" id="song-genre">
                                    <option value="">Select genre</option>
                                    <option value="Pop">Pop</option>
                                    <option value="Rock">Rock</option>
                                    <option value="Hip Hop">Hip Hop</option>
                                    <option value="Jazz">Jazz</option>
                                    <option value="Classical">Classical</option>
                                    <option value="Electronic">Electronic</option>
                                    <option value="Reggae">Reggae</option>
                                    <option value="R&B">R&B</option>
                                    <option value="Country">Country</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-music-note"></i> Add Song
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-vinyl"></i> My Playlist</h5>
                        <span class="badge bg-light text-dark" id="song-count">0 songs</span>
                    </div>
                    <div class="card-body p-0">
                        <div id="songs-container" class="p-3">
                            <!-- Songs will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Song Modal -->
    <div class="modal fade" id="editSongModal" tabindex="-1" aria-labelledby="editSongModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-warning">
                    <h5 class="modal-title" id="editSongModalLabel">
                        <i class="bi bi-pencil-square"></i> Edit Song
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-song-form">
                        <input type="hidden" id="edit-song-id">
                        
                        <div class="mb-3">
                            <label for="edit-song-title" class="form-label">Song Title *</label>
                            <input type="text" class="form-control" id="edit-song-title" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-song-artist" class="form-label">Artist</label>
                            <input type="text" class="form-control" id="edit-song-artist">
                        </div>
                        <div class="mb-3">
                            <label for="edit-song-genre" class="form-label">Genre</label>
                            <select class="form-select" id="edit-song-genre">
                                <option value="">Select genre</option>
                                <option value="Pop">Pop</option>
                                <option value="Rock">Rock</option>
                                <option value="Hip Hop">Hip Hop</option>
                                <option value="Jazz">Jazz</option>
                                <option value="Classical">Classical</option>
                                <option value="Electronic">Electronic</option>
                                <option value="Reggae">Reggae</option>
                                <option value="R&B">R&B</option>
                                <option value="Country">Country</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" form="edit-song-form" class="btn btn-warning">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="appToastMessage"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>
</html>
